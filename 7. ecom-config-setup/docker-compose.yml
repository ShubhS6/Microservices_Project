services:
  mysql:
    container_name: mysql
    image: mysql:latest
    mem_limit: 700m
    environment:
      MYSQL_ROOT_PASSWORD: Anaya@123  # Required for administrative access
      MYSQL_USER: shubh                          # Creates a non-root user
      MYSQL_PASSWORD: Shubham@123                      # Password for the non-root user
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3307:3306"
    networks:
      - backend
    restart: unless-stopped


  #rabbitmq
  rabbitmq:
    container_name: rabbitmq_container
    image: rabbitmq:4-management
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - backend
    restart: unless-stopped




networks:
  backend:
    driver: bridge

volumes:
  mysql_data: